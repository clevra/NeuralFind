<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Inter', sans-serif; 
      padding: 20px; 
      width: 280px; 
      margin: 0;
      background-color: #1a1a24;
      color: #e4e4e7;
    }
    h4 {
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-icon {
      font-size: 22px;
    }
    #popoutBtn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      border-radius: 4px;
      transition: background 0.2s;
      color: #a1a1aa;
      width: auto;
      box-shadow: none;
    }
    #popoutBtn:hover {
      background: #3f3f5a;
      transform: none;
      box-shadow: none;
    }
    .toggle-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid #3f3f5a;
    }
    .toggle-label {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #3f3f5a;
      transition: .3s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #3b82f6; /* Blue */
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    .input-header {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
    }
    textarea { 
      width: 100%; 
      height: 70px; 
      margin-bottom: 15px; 
      box-sizing: border-box;
      padding: 10px;
      resize: none;
      background: #27273a;
      border: 1px solid #3f3f5a;
      border-radius: 8px;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea:focus {
      border-color: #3b82f6; /* Blue */
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }
    .slider-container {
      margin-bottom: 22px;
      background: #27273a;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #3f3f5a;
    }
    .slider-header {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 10px;
      color: #a1a1aa;
      font-weight: 600;
    }
    #slider-val {
      color: #3b82f6; /* Blue */
    }
    input[type=range] {
      width: 100%;
      accent-color: #3b82f6; /* Blue */
      cursor: pointer;
    }
    button { 
      width: 100%; 
      padding: 14px; 
      background: linear-gradient(135deg, #60a5fa, #2563eb); /* Blue Gradient */
      color: white; 
      border: none; 
      cursor: pointer;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
      transition: transform 0.1s, box-shadow 0.2s;
    }
    button:hover { 
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
    }
    button:active {
      transform: translateY(1px);
    }
    #status {
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
      color: #60a5fa; /* Light Blue */
      min-height: 18px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h4>
    <div class="header-left">
      <span class="header-icon">🦊</span> AI Content Sniper
    </div>
    <button id="popoutBtn" title="Pin / Pop out window">📌</button>
  </h4>
  <div class="toggle-container">
    <span class="toggle-label">Enable AI Scan</span>
    <label class="switch">
      <input type="checkbox" id="enableToggle" checked>
      <span class="slider"></span>
    </label>
  </div>
  
  <div class="toggle-container">
    <span class="toggle-label">WebGPU (Experimental)</span>
    <label class="switch">
      <input type="checkbox" id="gpuToggle">
      <span class="slider"></span>
    </label>
  </div>
  
  <div class="input-header">Prompt for AI Search:</div>
  <textarea id="prompt" placeholder="What are you looking for? (e.g. positive news, jobs, tech...)"></textarea>
  
  <div class="slider-container">
    <div class="slider-header">
      <span>AI Strictness</span>
      <span id="slider-val">60%</span>
    </div>
    <input type="range" id="confidence" min="10" max="95" value="60">
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
